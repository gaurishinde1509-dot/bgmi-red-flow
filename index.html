<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Registration - Playz System</title>
    <style>
        :root {
            --primary-color: #4CAF50;
            --dark-color: #1a1a1a;
            --light-color: #ffffff;
            --grey-color: #f4f4f4;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--dark-color);
            color: var(--light-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #2a2a2a;
            width: 100%;
            max-width: 600px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            border: 1px solid #3a3a3a;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: var(--primary-color);
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: #ccc;
        }

        input[type="text"],
        input[type="tel"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #444;
            border-radius: 6px;
            background-color: #1f1f1f;
            color: #fff;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="tel"]:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* Payment Section (Scanner removed, phone payment added) */
        .payment-section {
            background-color: #1f1f1f;
            padding: 20px;
            border-radius: 8px;
            border: 2px dashed #444;
            text-align: center;
            margin: 25px 0;
        }

        .payment-section h3 {
            color: var(--light-color);
            font-size: 18px;
            margin-bottom: 10px;
        }

        .payment-phone {
            font-size: 26px;
            font-weight: bold;
            color: var(--primary-color);
            margin: 15px 0;
            letter-spacing: 1.5px;
            display: inline-block;
            background: #2a2a2a;
            padding: 8px 18px;
            border-radius: 6px;
            border: 1px solid #333;
        }

        .payment-instructions {
            font-size: 13px;
            color: #aaa;
            line-height: 1.5;
        }

        .file-upload-wrapper {
            position: relative;
            margin-top: 15px;
        }

        .file-upload-input {
            width: 100%;
            padding: 10px;
            background: #2a2a2a;
            border: 1px solid #444;
            color: #ccc;
            border-radius: 6px;
            cursor: pointer;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background-color 0.3s, transform 0.1s;
        }

        .submit-btn:hover {
            background-color: #45a049;
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .status-message {
            margin-top: 15px;
            text-align: center;
            font-weight: 600;
            display: none;
        }

        .status-success {
            color: #4CAF50;
        }

        .status-error {
            color: #f44336;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Tournament Registration</h2>
    
    <form id="registrationForm">
        <!-- Team Name -->
        <div class="form-group">
            <label for="teamName">Team Name</label>
            <input type="text" id="teamName" placeholder="Enter your team's name" required>
        </div>

        <!-- Players List -->
        <div class="form-group">
            <label for="players">Player Names / IGNs (comma-separated)</label>
            <textarea id="players" placeholder="Example: Player1, Player2, Player3, Player4" required></textarea>
        </div>

        <!-- Contact/WhatsApp -->
        <div class="form-group">
            <label for="whatsapp">WhatsApp Phone Number</label>
            <input type="tel" id="whatsapp" placeholder="Enter active WhatsApp number" required>
        </div>

        <!-- Payment Details Section -->
        <div class="payment-section">
            <h3>Payment Instructions</h3>
            <p class="payment-instructions">Pay your registration fee using GPay, PhonePe, or Paytm to this number:</p>
            
            <div class="payment-phone">
                📞 8999849027
            </div>
            
            <div class="form-group" style="text-align: left; margin-bottom: 0;">
                <label for="screenshot">Upload Payment Screenshot</label>
                <input type="file" id="screenshot" class="file-upload-input" accept="image/*" required>
            </div>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="submit-btn" id="submitBtn">Submit Registration</button>
        
        <!-- Status Notification -->
        <div id="statusMsg" class="status-message"></div>
    </form>
</div>

<script>
    document.getElementById('registrationForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const submitBtn = document.getElementById('submitBtn');
        const statusMsg = document.getElementById('statusMsg');
        
        const teamName = document.getElementById('teamName').value;
        const players = document.getElementById('players').value;
        const whatsapp = document.getElementById('whatsapp').value;

        // Visual loading state
        submitBtn.disabled = true;
        submitBtn.innerText = "Submitting...";
        statusMsg.style.display = "none";

        // Trigger the Email notification through Formspree
        sendEmailNotification(teamName, players, whatsapp, submitBtn, statusMsg);
    });

    // Send email notification using Formspree
    function sendEmailNotification(teamName, players, whatsapp, submitBtn, statusMsg) {
        const targetEmail = "roshukadam2218@gmail.com";
        const formspreeUrl = `https://formspree.io/f/${targetEmail}`; 

        const formData = {
            subject: `🏆 New Team Registered: ${teamName}`,
            _replyto: "no-reply@tournamentplayz.com",
            "Team Name": teamName,
            "Players": players,
            "WhatsApp Link": whatsapp
        };

        fetch(formspreeUrl, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                Accept: "application/json"
            },
            body: JSON.stringify(formData)
        })
        .then(response => {
            submitBtn.disabled = false;
            submitBtn.innerText = "Submit Registration";
            
            if (response.ok) {
                statusMsg.className = "status-message status-success";
                statusMsg.innerText = "Registration complete! Check your email for verification.";
                statusMsg.style.display = "block";
                document.getElementById('registrationForm').reset();
            } else {
                statusMsg.className = "status-message status-error";
                statusMsg.innerText = "Registration failed. Please try again.";
                statusMsg.style.display = "block";
            }
        })
        .catch(error => {
            console.error("Error connecting to Formspree:", error);
            submitBtn.disabled = false;
            submitBtn.innerText = "Submit Registration";
            statusMsg.className = "status-message status-error";
            statusMsg.innerText = "Error sending request. Check your connection.";
            statusMsg.style.display = "block";
        });
    }
</script>

</body>
</html>
