<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Registration</title>
    <style>
        :root {
            --primary-color: #4CAF50; /* BGMI Green */
            --dark-bg: #121212;
            --card-bg: #1a1a1a;
            --input-bg: #222222;
            --border-color: #333333;
            --text-color: #ffffff;
            --muted-text: #888888;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 550px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            border: 1px solid var(--border-color);
        }

        /* Slot Counter Styling */
        .slot-counter {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 0.5px;
            background-color: var(--input-bg);
            padding: 8px 16px;
            border-radius: 20px;
            display: inline-block;
            left: 50%;
            transform: translateX(-50%);
            position: relative;
            border: 1px solid var(--border-color);
        }

        /* Progress Bar */
        .progress-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            position: relative;
        }

        .progress-line {
            position: absolute;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            height: 4px;
            background-color: var(--border-color);
            width: 100%;
            z-index: 1;
        }

        .progress-line-fill {
            position: absolute;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            height: 4px;
            background-color: var(--primary-color);
            width: 0%;
            z-index: 2;
            transition: width 0.3s ease;
        }

        .step-circle {
            width: 35px;
            height: 35px;
            background-color: var(--input-bg);
            border: 2px solid var(--border-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            z-index: 3;
            transition: all 0.3s ease;
            color: var(--muted-text);
        }

        .step-circle.active {
            border-color: var(--primary-color);
            color: var(--primary-color);
            background-color: var(--dark-bg);
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.3);
        }

        .step-circle.completed {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
        }

        h2 {
            text-align: center;
            margin-bottom: 10px;
            color: var(--primary-color);
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 800;
        }

        .form-step {
            display: none;
        }

        .form-step.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 15px;
            color: var(--text-color);
        }

        input[type="text"],
        input[type="tel"],
        textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--input-bg);
            color: var(--text-color);
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="tel"]:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .payment-box {
            background-color: var(--input-bg);
            padding: 20px;
            border-radius: 8px;
            border: 1px dashed var(--border-color);
            text-align: center;
            margin-bottom: 20px;
        }

        .payment-box p {
            font-size: 14px;
            color: #ccc;
            line-height: 1.5;
        }

        .phone-number-badge {
            display: inline-block;
            font-size: 24px;
            font-weight: bold;
            color: var(--primary-color);
            background-color: var(--dark-bg);
            padding: 10px 20px;
            border-radius: 6px;
            margin: 15px 0;
            border: 1px solid var(--border-color);
            letter-spacing: 1px;
        }

        .file-upload-input {
            width: 100%;
            padding: 12px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: #ccc;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            transition: all 0.2s ease;
        }

        .btn-next, .btn-submit {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-next:hover, .btn-submit:hover {
            background-color: #45a049;
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
        }

        .btn-back {
            background-color: #333333;
            color: white;
        }

        .btn-back:hover {
            background-color: #444444;
        }

        .btn:disabled {
            background-color: #555555;
            color: #888888;
            cursor: not-allowed;
            box-shadow: none;
        }

        .status-message {
            margin-top: 15px;
            text-align: center;
            font-weight: 600;
            display: none;
        }

        .status-success { color: #4CAF50; }
        .status-error { color: #f44336; }
    </style>
</head>
<body>

<div class="container">
    <h2>Tournament Registration</h2>

    <!-- Live Slots Remaining Badge -->
    <div class="slot-counter">
        Slots Remaining: <span id="slotCount" style="color: #4CAF50;">48</span> / <span id="totalSlots">50</span>
    </div>

    <div class="progress-container">
        <div class="progress-line"></div>
        <div class="progress-line-fill" id="progressLineFill"></div>
        <div class="step-circle active">1</div>
        <div class="step-circle">2</div>
        <div class="step-circle">3</div>
        <div class="step-circle">4</div>
    </div>
    
    <form id="registrationForm">
        <!-- PAGE 1 -->
        <div class="form-step active" id="step-1">
            <div class="form-group">
                <label for="teamName">Team Name</label>
                <input type="text" id="teamName" placeholder="Enter your team's name" required>
            </div>
            <div class="btn-group">
                <button type="button" class="btn btn-next" onclick="nextStep(1)">Next</button>
            </div>
        </div>

        <!-- PAGE 2 -->
        <div class="form-step" id="step-2">
            <div class="form-group">
                <label for="players">Player Names / IGNs (comma-separated)</label>
                <textarea id="players" placeholder="Example: Player1, Player2, Player3, Player4" required></textarea>
            </div>
            <div class="btn-group">
                <button type="button" class="btn btn-back" onclick="prevStep(2)">Back</button>
                <button type="button" class="btn btn-next" onclick="nextStep(2)">Next</button>
            </div>
        </div>

        <!-- PAGE 3 -->
        <div class="form-step" id="step-3">
            <div class="form-group">
                <label for="whatsapp">WhatsApp Phone Number</label>
                <input type="tel" id="whatsapp" placeholder="Enter active WhatsApp number" required>
            </div>
            <div class="btn-group">
                <button type="button" class="btn btn-back" onclick="prevStep(3)">Back</button>
                <button type="button" class="btn btn-next" onclick="nextStep(3)">Next</button>
            </div>
        </div>

        <!-- PAGE 4 -->
        <div class="form-step" id="step-4">
            <div class="payment-box">
                <p>Pay your registration fee using GPay, PhonePe, or Paytm to this number:</p>
                <div class="phone-number-badge">
                    📞 8999849027
                </div>
                
                <div class="form-group" style="text-align: left; margin-bottom: 0;">
                    <label for="screenshot">Upload Payment Screenshot</label>
                    <input type="file" id="screenshot" class="file-upload-input" accept="image/*" required>
                </div>
            </div>

            <div class="btn-group">
                <button type="button" class="btn btn-back" id="backBtnFinal" onclick="prevStep(4)">Back</button>
                <button type="submit" class="btn btn-submit" id="submitBtn">Submit</button>
            </div>
        </div>

        <div id="statusMsg" class="status-message"></div>
    </form>
</div>

<script>
    let currentStep = 1;
    const steps = document.querySelectorAll('.form-step');
    const stepCircles = document.querySelectorAll('.step-circle');
    const progressLineFill = document.getElementById('progressLineFill');

    function updateProgressBar() {
        stepCircles.forEach((circle, index) => {
            if (index < currentStep) {
                circle.classList.add('completed');
                circle.classList.add('active');
            } else if (index === currentStep - 1) {
                circle.classList.add('active');
                circle.classList.remove('completed');
            } else {
                circle.classList.remove('active', 'completed');
            }
        });
        
        const progressPercentage = ((currentStep - 1) / (stepCircles.length - 1)) * 100;
        progressLineFill.style.width = `${progressPercentage}%`;
    }

    function nextStep(stepNumber) {
        if (stepNumber === 1 && !document.getElementById('teamName').value.trim()) {
            alert("Please enter your Team Name first.");
            return;
        }
        if (stepNumber === 2 && !document.getElementById('players').value.trim()) {
            alert("Please list your player names/IGNs first.");
            return;
        }
        if (stepNumber === 3 && !document.getElementById('whatsapp').value.trim()) {
            alert("Please enter your WhatsApp number first.");
            return;
        }

        document.getElementById(`step-${stepNumber}`).classList.remove('active');
        currentStep++;
        document.getElementById(`step-${currentStep}`).classList.add('active');
        updateProgressBar();
    }

    function prevStep(stepNumber) {
        document.getElementById(`step-${stepNumber}`).classList.remove('active');
        currentStep--;
        document.getElementById(`step-${currentStep}`).classList.add('active');
        updateProgressBar();
    }

    // Discord Integration Submission
    document.getElementById('registrationForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const submitBtn = document.getElementById('submitBtn');
        const backBtnFinal = document.getElementById('backBtnFinal');
        const statusMsg = document.getElementById('statusMsg');
        
        const teamName = document.getElementById('teamName').value;
        const players = document.getElementById('players').value;
        const whatsapp = document.getElementById('whatsapp').value;

        submitBtn.disabled = true;
        backBtnFinal.disabled = true;
        submitBtn.innerText = "Submitting...";
        statusMsg.style.display = "none";

        // IMPORTANT: Replace this placeholder string with your Discord URL
        const discordWebhookUrl = "YOUR_DISCORD_WEBHOOK_URL";

        if (discordWebhookUrl === "YOUR_DISCORD_WEBHOOK_URL") {
            alert("Developer Note: Paste your Discord Channel Webhook URL inside the script to capture this registration!");
            submitBtn.disabled = false;
            backBtnFinal.disabled = false;
            submitBtn.innerText = "Submit";
            return;
        }

        const payload = {
            username: "Tournament Tracker Bot",
            avatar_url: "https://i.imgur.com/4M24N3H.png",
            embeds: [{
                title: "🏆 New Tournament Registration!",
                color: 4976720,
                fields: [
                    { name: "Team Name", value: teamName, inline: true },
                    { name: "WhatsApp Contact", value: whatsapp, inline: true },
                    { name: "Roster / Players", value: players, inline: false }
                ],
                footer: { text: "System Logging Engine" },
                timestamp: new Date().toISOString()
            }]
        };

        const discordFormData = new FormData();
        discordFormData.append("payload_json", JSON.stringify(payload));
        
        const rawFileInput = document.getElementById('screenshot').files[0];
        if (rawFileInput) {
            discordFormData.append("file", rawFileInput, "screenshot.png");
        }

        fetch(discordWebhookUrl, {
            method: "POST",
            body: discordFormData
        })
        .then(response => {
            submitBtn.disabled = false;
            backBtnFinal.disabled = false;
            submitBtn.innerText = "Submit";
            
            if (response.ok) {
                statusMsg.className = "status-message status-success";
                statusMsg.innerText = "Registration logged successfully!";
                statusMsg.style.display = "block";
                
                // --- Slot Counter Reduction Logic ---
                let slotElement = document.getElementById('slotCount');
                let currentSlots = parseInt(slotElement.innerText);
                if (currentSlots > 0) {
                    slotElement.innerText = currentSlots - 1;
                }
                
                document.getElementById('registrationForm').reset();
                
                // Return to Page 1 cleanly
                document.getElementById(`step-${currentStep}`).classList.remove('active');
                currentStep = 1;
                document.getElementById(`step-1`).classList.add('active');
                updateProgressBar();
            } else {
                statusMsg.className = "status-message status-error";
                statusMsg.innerText = "Error sending verification. Check server limits.";
                statusMsg.style.display = "block";
            }
        })
        .catch(error => {
            console.error("Submission error:", error);
            submitBtn.disabled = false;
            backBtnFinal.disabled = false;
            submitBtn.innerText = "Submit";
            statusMsg.className = "status-message status-error";
            statusMsg.innerText = "Connection drop. Try resubmitting.";
            statusMsg.style.display = "block";
        });
    });
</script>

</body>
</html>
